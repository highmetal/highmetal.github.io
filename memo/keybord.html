<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebKeyboard</title>
    <style>
      .keyboard {
        display: flex;
      }
      .white {
        border: 1px solid;
        padding: 2.5%;
      }
      .black {
        border: 1px solid;
        padding: 1%;
        color: white;
        background-color: black;
      }
    </style>
  </head>
  <body>
    <div class="keyboard">
      <button class="c white">c</button>
      <button class="c♯ black">c♯</button>
      <button class="d white">d</button>
      <button class="e♭ black">e♭</button>
      <button class="e white">e</button>
      <button class="f white">f</button>
      <button class="f♯ black">f♯</button>
      <button class="g white">g</button>
      <button class="g♯ black">g♯</button>
      <button class="a white">a</button>
      <button class="b♭ black">b♭</button>
      <button class="b white">b</button>
    </div>
  </body>
  <script></script>
</html>
