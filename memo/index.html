<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字数カウンター</title>
    <style>
        #inputArea {
            width: 80%;
            height: 8rem;
            resize: none;
        }
    </style>
</head>

<body>
    <div>
        <textarea id="inputArea"></textarea>
        <div>
            <p>文字数：<span id="charCount"></span></p>
            <p>空白を除いた文字数：<span id="charCount-noSpace"></span></p>
            <p>改行を除いた文字数：<span id="charCount-noLine"></span></p>
            <p>空白と改行を除いた文字数：<span id="charCount-noSpace-noLine"></span></p>
        </div>
    </div>
</body>
<script>
    const inputArea = document.getElementById("inputArea");
    const charCount = document.getElementById("charCount");
    const charCountNoSpace = document.getElementById("charCount-noSpace");
    const charCountNoLine = document.getElementById("charCount-noLine");
    const charCountNoSpaceNoLine = document.getElementById("charCount-noSpace-noLine");

    //textareaで入力をしたら文字数を計算
    inputArea.addEventListener("input", function () {
        let text = inputArea.value;
        charCount.textContent = text.length;
        charCountNoSpace.textContent = removeSpace(text).length;
        charCountNoLine.textContent = removeLine(text).length;
        charCountNoSpaceNoLine.textContent = removeSpaceAndLine(text).length;
    })

    //空白削除
    function removeSpace(text) {
        return text.replace(/ /g, "").replace(/　/g, "");
    }

    //改行削除
    function removeLine(text) {
        return text.replace(/\n/g, "");
    }

    //空白と改行削除
    function removeSpaceAndLine(text) {
        return text.replace(/ |　|\n|\t/g, "");
    }

</script>

</html>
