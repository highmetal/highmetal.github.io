<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      table,
      th,
      td {
        border: 0.1rem solid;
        border-collapse: collapse;
      }
    </style>
  </head>
  <body>
    <button>見出しを追加する</button>
    <button>商品を追加する</button>
    <br />
    <input type="text" class="input" placeholder="名前" />
    <button class="setButton">追加</button>
    <table class="table">
      <tr>
        <th>✔</th>
        <th>名前</th>
      </tr>
      <tr>
        <th><input type="checkbox" /></th>
        <td>high</td>
      </tr>
    </table>

    <p class="message" style="visibility: hidden"></p>
  </body>
  <script>
    "use strict";
    const input = document.querySelector(".input");
    const setButton = document.querySelector(".setButton");
    const table = document.querySelector(".table");
    const message = document.querySelector(".message");

    //setが押された時の表の追加処理
    setButton.addEventListener("click", function () {
      //テキストボックスに入力値がない場合
      if (input.value === "") {
        //エラーメッセージの表示
        message.textContent = "テキストボックスに文字が入力されていません";
        message.style.color = "red";
        return;
      }
      message.style.visibility = "hidden";

      //危険な実装（不採用）
      //table.innerHTML += `<tr><th><input type="checkbox" /></th><td>${input.value}</td></tr>`;

      //安全な実装（採用）
      //表の枠組みを作成
      const new_tr = document.createElement("tr");
      const new_th = document.createElement("th");
      const new_td = document.createElement("td");
      const new_name = document.createTextNode(input.value);
      const new_check = document.createElement("input");
      new_check.type = "checkbox";

      //チェックボックス作成
      new_th.appendChild(new_check);
      new_tr.appendChild(new_th);

      //名前作成
      new_td.appendChild(new_name);
      new_tr.appendChild(new_td);

      //表に作成した要素を追加
      table.insertAdjacentElement("beforeend", new_tr);
      console.log(new_tr);

      //テキストボックスの内容を消す
      input.value = "";
    });
  </script>
</html>
