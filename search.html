<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>highmetal -サイト内検索-</title>

    <!-- icon -->
    <link rel="apple-touch-icon" href="" />
    <link rel="icon" href="image/high.ico" />

    <!-- リセットCSS -->
    <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css" />
    <!-- CSS -->
    <link rel="stylesheet" href="css/all.css" />
    <link rel="stylesheet" href="css/search.css" />
  </head>

  <body>
    <!-- ヘッダー要素 -->
    <header>
      <!-- ロゴ -->
      <div id="logo">
        <a href="/index.html">
          <img src="image/high.ico" alt="highmetalロゴ" />
        </a>
      </div>

      <div class="header-clock">
        <p class="clock" id="clock">2026/04/24　21:49:33</p>
      </div>

      <!-- ヘッダーリンク -->
      <div id="header-links">
        <span class="header-link"
          ><a href="aboutMe/index.html">自己紹介</a></span
        >
        <!-- ヘッダーのリンク二つ目未使用（六文字まで使用可能） -->
        <!-- <span class="header-link"></span> -->

        <!-- サイト内検索要素 -->
        <div class="header-search">
          <span class="search">
            <input
              type="text"
              placeholder="サイト内検索"
              class="header-search-input"
              id="headerSearchInput"
            />
            <button class="search-button" id="searchButton">検索</button>
          </span>
        </div>
      </div>
    </header>

    <!-- メイン要素 -->
    <main>
      <h1>検索</h1>
      <input
        type="text"
        class="search-input"
        id="searchInput"
        placeholder="検索..."
      />
      <div class="category">
        <h4>カテゴリから探す</h4>
        <span>買い物</span>
        <span>準備中</span>
        <span>準備中</span>
      </div>
      <div class="search-result" id="searchResult"></div>
    </main>

    <!-- フッター要素 -->
    <footer id="footer">
      <p>&copy;<span id="year"></span> highmetal All rights reserved.</p>
    </footer>
  </body>

  <script src="js/all.js"></script>
  <script src="js/search.js"></script>
</html>
