      .hamburger {
        width: 40px;
        height: 40px;
        background: transparent;
        border: none;
        cursor: pointer;
        padding: 0;
        display: flex;
        flex-direction: column;
        justify-content: space-around;
      }

      .line {
        width: 100%;
        height: 3px;
        background: #000000;
        transition: all 0.3s ease;
      }

      .onc span:nth-of-type(1) {
        transform: translate(0px, 13.3px) rotate(45deg);
      }

      .onc span:nth-of-type(2) {
        opacity: 0;
      }

      .onc span:nth-of-type(3) {
        transform: translate(0px, -13.3px) rotate(-45deg);
      }

      body {
        transition:
          background-color 0.2s ease,
          color 0.2s ease;
        font-family: sans-serif;
        padding: 20px;
      }
    </style>
