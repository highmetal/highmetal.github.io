<!doctype html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>カード金額計算</title>
    <link rel="icon" href="https://highmetal.github.io/high.ico" />
    <link rel="apple-touch-icon" href="ati.PNG" />
    <link href="https://fonts.googleapis.com" rel="stylesheet" />
<!-- リセットCSS -->
<!--
    <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css">
-->
<!-- CSS -->
    <link rel="stylesheet" href="style.css">
    
</head>

<body>
    <div class="title">
        <h2>カード金額計算</h2>
        <h5 class="var">version 1.5.5</h5>
    </div>

    <form id="form">
        <div class="m1">
            <div class="m2">
                <div class="search-container">
                    <label>カード名 :
                        <input type="text" id="name" placeholder="ミラクル・ミラダンテ"/>
                    </label>
                    <span class="clear-button" id="clearBtn">×</span>
                </div>
                <br />
                <label>　　値段 : <input type="number" id="amount" min="0" placeholder="500" />円
                </label>
                <br />
                <label>　　枚数 : <input type="number" id="quantity" min="1" placeholder="4" />枚
                </label>
                <br />
                <label>　　備考 : <input type="text" id="kari" placeholder="使用デッキ、購入予定店舗" /> </label>
                <br />
            </div>
            <div class="operationButton">
                <button type="submit" id="addbutton">リストに追加</button>
                <button type="button" id="loadButton" onclick="pasteList()">
                    コピーしたリストの読み込み
                </button>
                <button type="button" id="allDelete">一括削除</button>
            </div>
        </div>
    </form>

    <p id="message"></p>

    <div id="target">
        <table id="table">
            <tr>
                <th>カード名　</th>
                <th>値段</th>
                <th>枚数</th>
                <th>小計</th>
                <th>✔</th>
                <th>備考</th>
                <th class="no-shot">編集</th>
                <th class="no-shot">削除</th>
                <th class="no-shot">並び替え</th>
            </tr>
        </table>
        <div id="sum">
            <p id="sumQuantity">総枚数: 0枚</p>
            <p id="sumAmount">総計: 0円</p>
        </div>
    </div>
    <div id="footerButton">
        <button id="capture">リストのダウンロード</button>
        <button onclick="listCopy()">リストのコピー</button>
    </div>
    <div class="modal">
        <div class="modalContent">
            <h3 class="modalTitle"></h3>
            <p class="modalMessage"></p>
            <div class="buttons">
                <button class="modalButtonT">はい</button>
                <button class="modalButtonF">いいえ</button>
                <button class="modalButtonOut">とじる</button>
            </div>
        </div>
    </div>

    <button id="topBack">トップへ戻る</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.8.3/jquery.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jqueryui/1.8.24/jquery-ui.min.js"></script>
    <script
        src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.3/jquery.ui.touch-punch.min.js"></script>

    <script src="script.js"></script>
</body>

</html>
