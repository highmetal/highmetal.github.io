<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
        chat?
    </title>
    <link rel="apple-touch-icon" href="" />
    <link rel="icon" href="" />
    <style>
        html {
            width: 100%;
            height: 100%;
        }

        body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        main {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        #name {
            background-color: #333;
            color: #eee;
            top: 0;
            left: 0;
            width: 100%;
            height: 30px;
        }

        #name:before {
            content: "< ";
            font-size: 20px;
        }

        #chat {
            padding-top: 1%;
            width: 100%;
            flex: 1;
            overflow-y: auto;
            background-color: skyblue;
        }

        .message {
            margin-bottom: 1%;
            padding: 1%;
            width: fit-content;
            height: fit-content;
        }

        .userChat {
            background-color: lime;
            margin-right: 2%;
            margin-left: auto;
        }

        .comChat {
            background-color: #eee;
            margin-left: 2%;
        }

        input[type="file"]::file-selector-button {
            background-color: rgb(54, 255, 94);
            display: none;
        }

        #input {
            display: flex;
            width: 100%;
            height: 24px;
            position: fixed;
            bottom: 1%;
            left: 1%;
            background-color: #eee;
            font-size: 20px;
            padding: 1%;

        }

        #text {
            width: 80%;
            font-size: 20px;
            resize: none;
        }

        #fileLabel {
            display: inline-block;
            width: 30px;
        }

        #send {
            background-color: transparent;
            border: none;
            position: absolute;
            left: 90%;
            height: 24px;
            font-size: 20px;
            color: rgb(64, 145, 174);
        }
    </style>
</head>

<body>
    <main>
        <div id="name">highmetal</div>
        <div id="chat"></div>
        <div id=input>
            <textarea id="text"></textarea>
            <div>
                <label id="fileLabel">
                    ◼️<input type="file">
                </label>
            </div>
            <button id="send">▶︎</button>
        </div>
    </main>
</body>
<script>
    const chatField = document.getElementById("chat");
    const inputText = document.getElementById("text");
    const sendButton = document.getElementById("send");

    const comChatList = ["こんにちは", "はい", "w", "？"];

    sendButton.addEventListener("click", function () {
        if (inputText.value === "") {
            return;
        }
        userChatAdd();

        switch (inputText.value) {
            case "0":
            case "1":
            case "2":
            case "3":
                comandChat(inputText.value);
                break;
            case "highmetal":
            case "icon":
                secretChat(inputText.value);
                break;

            default:
                setTimeout(() => {
                    comChatAdd();
                }, 500);
        }
        inputText.value = "";


    });

    startChat();

    function userChatAdd() {
        const chatText = document.createElement("div");
        chatText.className = "userChat message";
        console.log(inputText.value.length);

        chatText.textContent = inputText.value;
        chatField.appendChild(chatText);
        chatField.scrollTop = chatField.scrollHeight;
    }

    function comChatAdd() {
        const chatText = document.createElement("div");
        chatText.className = "comChat message";
        chatText.textContent = comChatList[Math.floor(Math.random() * 4)];
        chatField.appendChild(chatText);
        chatField.scrollTop = chatField.scrollHeight;
    }

    function comandChat(num) {
        const chatText = document.createElement("div");
        chatText.className = "comChat message";
        chatText.textContent = comChatList[num];
        chatField.appendChild(chatText);
        chatField.scrollTop = chatField.scrollHeight;
    }

    function startChat() {
        const chatText = document.createElement("div");
        chatText.className = "comChat message";
        chatText.textContent = "チャットだよ";
        chatField.appendChild(chatText);
        chatField.scrollTop = chatField.scrollHeight;
    }

    function secretChat(text) {
        switch (text) {
            case "highmetal":
                const chatLink = document.createElement("a");
                chatLink.className = "comChat message";
                chatLink.href = "https://highmetal.github.io";
                chatLink.target = "_brank";
                chatLink.textContent = "highmetal.github.io";
                chatField.appendChild(chatLink);
                chatField.scrollTop = chatField.scrollHeight;
                break;
            case "icon":
                const chatImage = document.createElement("img");
                chatImage.className = "comChat message";
                chatImage.src = "https://highmetal.github.io/image/high.ico";
                chatField.appendChild(chatImage);
                chatField.scrollTop = chatField.scrollHeight;
                break;
            default:
        }
    }

</script>

</html>
