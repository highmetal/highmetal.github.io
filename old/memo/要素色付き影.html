<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title></title>

<style>
 
  .box {
    position: relative;
    width:300px;
    padding:20px;
    background: #fff;
    border: 2px solid #000;
  }

  .box::after {
    content: '';
    position: absolute;
    top: -2px;
    left: -2px;
    width:100%;
    height:100%;
    background: #00cc00;
    border: 2px solid #000;
    transform: translate(10px, 10px);
    z-index: -1;
  }
</style>

</head>
<body>

<div class="box">
</div>

</body>
</html>
