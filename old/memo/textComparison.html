<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>文字列比較</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 20px;
      }
      .container,
      .result {
        display: flex;
        gap: 20px;
      }
      .container > *,
      .result > * {
        flex: 1;
      }
      textarea,
      .box {
        width: 100%;
        height: 220px;
        border: 1px solid #ccc;
        padding: 10px;
        white-space: pre-wrap;
        overflow: auto;
        font-family: monospace;
      }

      .del {
        background: #ffd6d6;
        color: red;
      }

      .add {
        background: #d6ffd6;
        color: green;
      }

      button {
        margin: 15px 0;
      }
    </style>
  </head>
  <body>
    <h2>テキスト比較</h2>

    <div class="container">
      <textarea id="text1" placeholder="元のテキスト"></textarea>
      <textarea id="text2" placeholder="比較後のテキスト"></textarea>
    </div>

    <div class="result">
      <div>
        <h3>元</h3>
        <div id="left" class="box"></div>
      </div>

      <div>
        <h3>比較後</h3>
        <div id="right" class="box"></div>
      </div>
    </div>

    <script>
      function diff(a, b) {
        const m = a.length,
          n = b.length;
        const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));

        for (let i = 0; i < m; i++) {
          for (let j = 0; j < n; j++) {
            if (a[i] === b[j]) {
              dp[i + 1][j + 1] = dp[i][j] + 1;
            } else {
              dp[i + 1][j + 1] = Math.max(dp[i][j + 1], dp[i + 1][j]);
            }
          }
        }

        let i = m,
          j = n;
        const res = [];

        while (i > 0 && j > 0) {
          if (a[i - 1] === b[j - 1]) {
            res.push({ type: "same", char: a[i - 1] });
            i--;
            j--;
          } else if (dp[i][j - 1] >= dp[i - 1][j]) {
            res.push({ type: "add", char: b[j - 1] });
            j--;
          } else {
            res.push({ type: "del", char: a[i - 1] });
            i--;
          }
        }

        while (i > 0) res.push({ type: "del", char: a[--i] });
        while (j > 0) res.push({ type: "add", char: b[--j] });

        return res.reverse();
      }

      function comparison() {
        const a = text1.value;
        const b = text2.value;

        const left = document.getElementById("left");
        const right = document.getElementById("right");

        left.textContent = "";
        right.textContent = "";

        diff(a, b).forEach((d) => {
          if (d.type === "same") {
            const s1 = document.createElement("span");
            s1.textContent = d.char;

            const s2 = document.createElement("span");
            s2.textContent = d.char;

            left.appendChild(s1);
            right.appendChild(s2);
          }

          if (d.type === "del") {
            const s = document.createElement("span");
            s.className = "del";
            s.textContent = d.char;
            left.appendChild(s);
          }

          if (d.type === "add") {
            const s = document.createElement("span");
            s.className = "add";
            s.textContent = d.char;
            right.appendChild(s);
          }
        });
      }

      document.getElementById("text1").addEventListener("input", function () {
        comparison();
      });
      document.getElementById("text2").addEventListener("input", function () {
        comparison();
      });
    </script>
  </body>
</html>
