<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作曲</title>

    <style>
        body {
            font-family: sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        h1 {
            margin-bottom: 12px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin-bottom: 18px;
        }

        button {
            padding: 8px 14px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: #1976d2;
            color: white;
        }

        button:hover {
            background: #145ca8;
        }

        .length-btn.active {
            background: #e65100;
        }

        input,
        select {
            padding: 6px;
        }

        #grid {
            background: white;
            border: 1px solid #ccc;
            overflow: auto;
            height: 75vh;
            padding: 10px;
        }

        .row {
            display: flex;
            align-items: center;
            margin-bottom: 2px;
        }

        .note-label {
            width: 90px;
            text-align: right;
            padding-right: 8px;
            font-size: 12px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .black-label {
            color: #c62828;
        }

        .cell {
            width: 34px;
            height: 24px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            flex-shrink: 0;
        }

        .cell:hover {
            background: #ddd;
        }

        .cell.active {
            background: #4caf50;
        }

        .measure {
            border-right: 4px solid black;
        }
    </style>
</head>

<body>

    <div class="controls">

        <label>
            BPM:
            <input type="number" id="bpm" value="120" min="40" max="300">
        </label>

        <label>
            波形:
            <select id="wave">
                <option value="triangle">triangle</option>
                <option value="sine">sine</option>
                <option value="square">square</option>
                <option value="sawtooth">sawtooth</option>
            </select>
        </label>

        <button id="play">▶ 再生</button>

        <button id="stop">■ 停止</button>

        <button id="addMeasure">＋ 小節追加</button>

    </div>

    <div class="controls">

        音の長さ:

        <button class="length-btn active" data-length="1">
            4分音符
        </button>

        <button class="length-btn" data-length="2">
            2分音符
        </button>

        <button class="length-btn" data-length="4">
            全音符
        </button>

    </div>

    <div id="grid"></div>

    <script>
        const audioCtx =
            new (window.AudioContext || window.webkitAudioContext)();

        // ====================================
        // ドレミ表記
        // ====================================
        const noteMap = {
            "C": "ド",
            "C#": "ド#",
            "D": "レ",
            "D#": "レ#",
            "E": "ミ",
            "F": "ファ",
            "F#": "ファ#",
            "G": "ソ",
            "G#": "ソ#",
            "A": "ラ",
            "A#": "ラ#",
            "B": "シ"
        };

        // ====================================
        // 88鍵生成
        // ====================================
        const noteNames = [
            "C", "C#", "D", "D#",
            "E", "F", "F#", "G",
            "G#", "A", "A#", "B"
        ];

        const notes = [];

        for (let midi = 21; midi <= 108; midi++) {

            const freq =
                440 * Math.pow(2, (midi - 69) / 12);

            const octave =
                Math.floor(midi / 12) - 1;

            const english =
                noteNames[midi % 12];

            const jpName =
                noteMap[english] + octave;

            notes.unshift({
                name: jpName,
                freq,
                isBlack: english.includes("#")
            });
        }

        // ====================================
        // シーケンサー
        // ====================================
        const beatsPerMeasure = 4;

        let measures = 4;

        let totalSteps = measures * beatsPerMeasure;

        const grid =
            document.getElementById("grid");

        // pattern[row][col]
        // null or 長さ
        let pattern = [];

        // 現在選択中の音価
        let selectedLength = 1;

        // 再生中osc
        let playingOscillators = [];

        // ====================================
        // 初期化
        // ====================================
        function initPattern() {

            pattern = [];

            for (let r = 0; r < notes.length; r++) {

                pattern[r] = [];

                for (let c = 0; c < totalSteps; c++) {

                    pattern[r][c] = null;
                }
            }
        }

        // ====================================
        // グリッド描画
        // ====================================
        function renderGrid() {

            grid.innerHTML = "";

            notes.forEach((note, row) => {

                const rowDiv =
                    document.createElement("div");

                rowDiv.className = "row";

                const label =
                    document.createElement("div");

                label.className = "note-label";

                if (note.isBlack) {
                    label.classList.add("black-label");
                }

                label.textContent = note.name;

                rowDiv.appendChild(label);

                for (let col = 0; col < totalSteps; col++) {

                    const cell =
                        document.createElement("div");

                    cell.className = "cell";

                    if (pattern[row][col]) {
                        cell.classList.add("active");

                        // 長さ表示
                        const len =
                            pattern[row][col];

                        if (len === 2) {
                            cell.style.background =
                                "#ff9800";
                        }

                        if (len === 4) {
                            cell.style.background =
                                "#e91e63";
                        }
                    }

                    // 小節線
                    if ((col + 1) % beatsPerMeasure === 0) {
                        cell.classList.add("measure");
                    }

                    cell.addEventListener("click", () => {

                        // 既に入力済みなら削除
                        if (pattern[row][col]) {

                            pattern[row][col] = null;

                        } else {

                            pattern[row][col] =
                                selectedLength;
                        }

                        renderGrid();
                    });

                    rowDiv.appendChild(cell);
                }

                grid.appendChild(rowDiv);
            });
        }

        // ====================================
        // 音価選択
        // ====================================
        document
            .querySelectorAll(".length-btn")
            .forEach(btn => {

                btn.addEventListener("click", () => {

                    document
                        .querySelectorAll(".length-btn")
                        .forEach(b => b.classList.remove("active"));

                    btn.classList.add("active");

                    selectedLength =
                        Number(btn.dataset.length);
                });
            });

        // ====================================
        // 小節追加
        // ====================================
        document
            .getElementById("addMeasure")
            .addEventListener("click", () => {

                measures++;

                totalSteps =
                    measures * beatsPerMeasure;

                for (let r = 0; r < notes.length; r++) {

                    for (let i = 0; i < beatsPerMeasure; i++) {

                        pattern[r].push(null);
                    }
                }

                renderGrid();
            });

        // ====================================
        // 音を鳴らす
        // ====================================
        function playNote(
            freq,
            startTime,
            duration
        ) {

            const osc =
                audioCtx.createOscillator();

            const gain =
                audioCtx.createGain();

            osc.type =
                document.getElementById("wave").value;

            osc.frequency.value = freq;

            gain.gain.setValueAtTime(
                0.2,
                startTime
            );

            gain.gain.exponentialRampToValueAtTime(
                0.001,
                startTime + duration
            );

            osc.connect(gain);

            gain.connect(audioCtx.destination);

            osc.start(startTime);

            osc.stop(startTime + duration);

            playingOscillators.push(osc);
        }

        // ====================================
        // 再生
        // ====================================
        document
            .getElementById("play")
            .addEventListener("click", async () => {

                await audioCtx.resume();

                stopAllSounds();

                const bpm =
                    Number(
                        document.getElementById("bpm").value
                    );

                const beatTime =
                    60 / bpm;

                const startTime =
                    audioCtx.currentTime + 0.1;

                for (let col = 0; col < totalSteps; col++) {

                    const noteTime =
                        startTime + col * beatTime;

                    for (let row = 0; row < notes.length; row++) {

                        const length =
                            pattern[row][col];

                        if (length) {

                            playNote(
                                notes[row].freq,
                                noteTime,
                                beatTime * length
                            );
                        }
                    }
                }
            });

        // ====================================
        // 停止
        // ====================================
        function stopAllSounds() {

            playingOscillators.forEach(osc => {

                try {
                    osc.stop();
                } catch (e) { }
            });

            playingOscillators = [];
        }

        document
            .getElementById("stop")
            .addEventListener("click", () => {

                stopAllSounds();
            });

        // ====================================
        // 起動
        // ====================================
        initPattern();

        renderGrid();

    </script>

</body>

</html>
