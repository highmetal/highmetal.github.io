<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Piano</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      user-select: none;
    }

    .controls {
      margin-bottom: 20px;
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
    }

    .keyboard {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .row {
      display: flex;
      gap: 4px;
      align-items: flex-start;
    }

    button {
      width: 64px;
      height: 64px;
      font-size: 14px;
      cursor: pointer;
    }

    .black {
      height: 48px;
    }

    .code-row button {
      width: 92px;
    }
  </style>
</head>

<body>

  <div class="controls">
    <label>
      Volume
      <input type="range" id="volume" min="0" max="1" step="0.01" value="0.3">
    </label>

    <label>
      Wave
      <select id="wave">
        <option value="triangle">triangle</option>
        <option value="sine">sine</option>
        <option value="square">square</option>
        <option value="sawtooth">sawtooth</option>
      </select>
    </label>

    <label>
      Octave Shift
      <span id="octaveLabel">1</span>
    </label>
  </div>

  <div class="keyboard">

    <div class="row" id="blackRow"></div>

    <div class="row" id="whiteRow"></div>

    <div class="row code-row" id="codeRow"></div>

  </div>

  <script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const volumeInput = document.getElementById('volume');
    const waveSelect = document.getElementById('wave');
    const octaveLabel = document.getElementById('octaveLabel');

    let baseShift = 0;

    const activeNotes = new Map();
    const activeCodes = new Map();

    const NOTES = ['C', 'C#', 'D', 'Eb', 'E', 'F', 'F#', 'G', 'G#', 'A', 'Bb', 'B'];

    function noteToMidi(note) {
      const m = note.match(/^([A-G])(#|b)?(\d)$/);
      const n = m[1] + (m[2] || '');
      const oct = parseInt(m[3]);
      return (oct + 1) * 12 + NOTES.indexOf(n);
    }

    function midiToNote(midi) {
      const note = NOTES[midi % 12];
      const oct = Math.floor(midi / 12) - 1;
      return note + oct;
    }

    function freqFromNote(note) {
      const midi = noteToMidi(note);
      return 440 * Math.pow(2, (midi - 69) / 12);
    }

    function shiftNote(note, semitone) {
      return midiToNote(noteToMidi(note) + semitone);
    }

    const whiteKeys = [
      ['a', 'F3'],
      ['s', 'G3'],
      ['d', 'A3'],
      ['f', 'B3'],
      ['g', 'C4'],
      ['h', 'D4'],
      ['j', 'E4'],
      ['k', 'F4'],
      ['l', 'G4'],
      [';', 'A4'],
      [':', 'B4'],
      [']', 'C5']
    ];

    const blackKeys = [
      ['w', 'F#3'],
      ['e', 'G#3'],
      ['r', 'Bb3'],
      ['y', 'C#4'],
      ['u', 'Eb4'],
      ['o', 'F#4'],
      ['p', 'G#4'],
      ['@', 'Bb4']
    ];

    const codeKeys = {
      z: ['C4', 'E4', 'G4'],
      x: ['D4', 'F4', 'A4'],
      c: ['E4', 'G4', 'B4'],
      v: ['F4', 'A4', 'C5'],
      b: ['G4', 'B4', 'D5'],
      n: ['A4', 'C5', 'E5'],
      m: ['B4', 'D5', 'F5'],
      ',': ['C5', 'E5', 'G5'],
      '.': ['D5', 'F5', 'A5'],
      '/': ['E5', 'G5', 'B5']
    };

    function currentWhite() {
      return whiteKeys.map(([k, n]) => [k, shiftNote(n, baseShift)]);
    }

    function currentBlack() {
      return blackKeys.map(([k, n]) => [k, shiftNote(n, baseShift)]);
    }

    function currentCodes() {
      const out = {};
      for (const k in codeKeys) {
        out[k] = codeKeys[k].map(n => shiftNote(n, baseShift));
      }
      return out;
    }

    function startNote(id, note) {
      if (activeNotes.has(id)) return;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = waveSelect.value;
      osc.frequency.value = freqFromNote(note);

      gain.gain.value = parseFloat(volumeInput.value);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();

      activeNotes.set(id, { osc, gain });
    }

    function stopNote(id) {
      const data = activeNotes.get(id);
      if (!data) return;

      data.gain.gain.cancelScheduledValues(audioCtx.currentTime);
      data.gain.gain.setValueAtTime(data.gain.gain.value, audioCtx.currentTime);
      data.gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.03);

      data.osc.stop(audioCtx.currentTime + 0.03);

      activeNotes.delete(id);
    }

    function startChord(key, notes) {
      if (activeCodes.has(key)) return;

      const ids = [];

      notes.forEach((note, i) => {
        const id = key + '_' + i;
        ids.push(id);
        startNote(id, note);
      });

      activeCodes.set(key, ids);
    }

    function stopChord(key) {
      const ids = activeCodes.get(key);
      if (!ids) return;

      ids.forEach(stopNote);
      activeCodes.delete(key);
    }

    function createButton(text, cls = '') {
      const b = document.createElement('button');
      b.textContent = text;
      if (cls) b.className = cls;
      return b;
    }

    function render() {
      const blackRow = document.getElementById('blackRow');
      const whiteRow = document.getElementById('whiteRow');
      const codeRow = document.getElementById('codeRow');

      blackRow.innerHTML = '';
      whiteRow.innerHTML = '';
      codeRow.innerHTML = '';

      currentBlack().forEach(([key, note]) => {
        const btn = createButton(note, 'black');

        btn.onmousedown = () => startNote('mouse_' + key, note);
        btn.onmouseup = () => stopNote('mouse_' + key);
        btn.onmouseleave = () => stopNote('mouse_' + key);
        btn.ontouchstart = (e) => {
          e.preventDefault();
          startNote('mouse_' + key, note);
        };
        btn.ontouchend = () => stopNote('mouse_' + key);

        blackRow.appendChild(btn);
      });

      currentWhite().forEach(([key, note]) => {
        const btn = createButton(note);

        btn.onmousedown = () => startNote('mouse_' + key, note);
        btn.onmouseup = () => stopNote('mouse_' + key);
        btn.onmouseleave = () => stopNote('mouse_' + key);
        btn.ontouchstart = (e) => {
          e.preventDefault();
          startNote('mouse_' + key, note);
        };
        btn.ontouchend = () => stopNote('mouse_' + key);

        whiteRow.appendChild(btn);
      });

      const codes = currentCodes();

      Object.keys(codes).forEach(key => {
        const btn = createButton(codes[key].join(' '));

        btn.onmousedown = () => startChord('mouse_' + key, codes[key]);
        btn.onmouseup = () => stopChord('mouse_' + key);
        btn.onmouseleave = () => stopChord('mouse_' + key);
        btn.ontouchstart = (e) => {
          e.preventDefault();
          startChord('mouse_' + key, codes[key]);
        };
        btn.ontouchend = () => stopChord('mouse_' + key);

        codeRow.appendChild(btn);
      });

      octaveLabel.textContent = (baseShift / 2) + 1;
    }

    render();

    const pressed = new Set();

    window.addEventListener('keydown', async (e) => {
      if (audioCtx.state === 'suspended') {
        await audioCtx.resume();
      }

      const key = e.key;

      if (pressed.has(key)) return;
      pressed.add(key);

      if (/[1-9]/.test(key)) {
        baseShift = (parseInt(key) - 1) * 2;
        render();
        return;
      }

      const white = currentWhite().find(v => v[0] === key);
      if (white) {
        startNote('kbd_' + key, white[1]);
        return;
      }

      const black = currentBlack().find(v => v[0] === key);
      if (black) {
        startNote('kbd_' + key, black[1]);
        return;
      }

      const codes = currentCodes();
      if (codes[key]) {
        startChord('kbd_' + key, codes[key]);
      }
    });

    window.addEventListener('keyup', (e) => {
      const key = e.key;

      pressed.delete(key);

      stopNote('kbd_' + key);
      stopChord('kbd_' + key);
    });
  </script>

</body>

</html>
