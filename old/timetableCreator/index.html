<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com" rel="stylesheet" />
    <title>時間割作成</title>
    <style>
      html{
        font-family: "Zen Maru Gothic", sans-serif;
      }
      table {
        border-collapse: collapse;
        margin: 0 auto;
        background-color: #000000;
        text-align: center;
        font-size: 18px;
      }

      th,
      td {
        border: 1px solid #000000;
      }

      tr {
        background-color: rgb(255, 255, 255);
        height: 80px;
      }
      #title,
      #header {
        height: 10px;
      }

      #title input {
        width: 40%;
      }

      input[id^="courseTitle"] {
        font-size: 14.5px;
        width: 140px;
      }

      input[id^="classroom_"],
      input[id^="teacher_"] {
        width: 42.3%;
      }

      img {
        width: 95%;
        padding: 3%;
      }

      #view {
        visibility: hidden;
        background-color: rgb(164, 164, 164);
      }

      @media (max-width: 768px) {
        body {
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <h1>時間割作成</h1>
    <table id="table"></table>
    <button id="saveButton">保存</button>
    <button id="deleteButton">削除</button>
    <div id="view">
      <h3>長押しで保存</h3>
      <img class="result" />
    </div>
  </body>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    const tableElement = document.getElementById("table");
    const saveButton = document.getElementById("saveButton");
    window.addEventListener("load", () => {
      const savedData = JSON.parse(
        localStorage.getItem("timetableData") || "{}",
      );

      Object.keys(savedData).forEach((id) => {
        const input = document.getElementById(id);
        if (input) input.value = savedData[id];
      });
    });

    saveButton.addEventListener("click", function () {
      // 保存ボタン押下時にlocalStorageにも保存
      saveToLocalStorage();

      document.getElementById("view").style.visibility = "visible";
      const backup = replaceInputsWithText(tableElement);

      html2canvas(tableElement, { scale: 2 }).then((canvas) => {
        const resultImg = document.querySelector(".result");
        resultImg.src = canvas.toDataURL("image/png");
        resultImg.style.display = "block";

        restoreInputs(backup);
      });
    });

    function saveToLocalStorage() {
      const inputs = tableElement.querySelectorAll("input");
      const data = {};
      inputs.forEach((input) => {
        if (input.id) data[input.id] = input.value;
      });
      localStorage.setItem("timetableData", JSON.stringify(data));
    }

    function replaceInputsWithText(table) {
      const inputs = table.querySelectorAll("input");
      const backup = [];
      inputs.forEach((input) => {
        const span = document.createElement("span");
        span.textContent = input.value || "";
        span.style.fontSize = window.getComputedStyle(input).fontSize;
        span.style.fontFamily = window.getComputedStyle(input).fontFamily;
        span.style.display = "inline-block";
        span.style.width = input.offsetWidth + "px";
        span.style.height = input.offsetHeight + "px";
        input.parentNode.replaceChild(span, input);
        backup.push({ input, span });
      });
      return backup;
    }

    function restoreInputs(backup) {
      backup.forEach(({ input, span }) => {
        span.parentNode.replaceChild(input, span);
      });
    }

    const deleteButton = document.getElementById("deleteButton");
    deleteButton.addEventListener("click", function () {
      const inputAll = document.querySelectorAll("input");

      // すべてのinputが空かどうかをチェック
      const allEmpty = Array.from(inputAll).every(
        (input) => input.value === "",
      );
      if (allEmpty) return;

      if (!confirm("時間割を削除しますか？")) return;

      // localStorageのデータを削除
      localStorage.removeItem("timetableData");

      // すべてのinputを空にする
      inputAll.forEach((input) => {
        input.value = "";
      });

      // 保存後の画像表示部分非表示
      const viewDiv = document.getElementById("view");
      viewDiv.style.visibility = "hidden";
      const resultImg = document.querySelector(".result");
      resultImg.src = "";
    });

    //title作成
    const titleRow = document.createElement("tr");
    const titleCell = document.createElement("th");
    const input = document.createElement("input");
    input.placeholder = "タイトル";
    input.id = "titleInput"; // localStorage用id
    titleRow.id = "title";
    titleCell.colSpan = "6";
    titleCell.appendChild(input);
    titleRow.appendChild(titleCell);
    tableElement.appendChild(titleRow);

    //曜日作成
    const dayLabels = ["", "月", "火", "水", "木", "金"];
    const headerRow = document.createElement("tr");
    headerRow.id = "header";
    dayLabels.forEach(function (dayLabel) {
      createHeaderCell(dayLabel);
    });
    tableElement.appendChild(headerRow);

    //時間・講義作成
    let periodIndex = 0;
    createScheduleRow();

    //曜日セル作成関数
    function createHeaderCell(dayLabel) {
      const headerCell = document.createElement("th");
      headerCell.appendChild(document.createTextNode(dayLabel));
      headerRow.appendChild(headerCell);
    }

    //時間セル作成関数
    function createTimeCell(row, index) {
      const timeLabels = [
        "1講目9:30~11:00",
        "2講目11:10~12:40",
        "3講目13:20~14:50",
        "4講目15:00~16:30",
      ];
      const timeCell = document.createElement("th");
      timeCell.appendChild(document.createTextNode(timeLabels[index]));
      timeCell.classList.add("timeCell");
      row.appendChild(timeCell);
    }

    //講義セル作成関数（createScheduleRow内で動く）
    function createDataCell(row, periodIndex, dayIndex) {
      const dataCell = document.createElement("td");

      const courseTitle = document.createElement("input");
      courseTitle.placeholder = "講義名";
      courseTitle.id = `courseTitle_${periodIndex}_${dayIndex}`;
      dataCell.appendChild(courseTitle);

      const classroom = document.createElement("input");
      classroom.placeholder = "教室名";
      classroom.id = `classroom_${periodIndex}_${dayIndex}`;
      dataCell.appendChild(classroom);

      const teacher = document.createElement("input");
      teacher.placeholder = "教師名";
      teacher.id = `teacher_${periodIndex}_${dayIndex}`;
      dataCell.appendChild(teacher);

      row.appendChild(dataCell);
    }

    //時間・講義行作成関数
    function createScheduleRow() {
      const timeRow = document.createElement("tr");
      createTimeCell(timeRow, periodIndex);

      for (let i = 0; i < dayLabels.length - 1; i++) {
        createDataCell(timeRow, periodIndex, i);
      }
      tableElement.appendChild(timeRow);

      if (++periodIndex < 4) createScheduleRow();
    }
  </script>
</html>
